<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKCARD — สินค้าในตู้</title>
<meta name="description" content="เช็กสินค้า ราคา และจำนวนคงเหลือในตู้ BLACKCARD ทุกสาขา อัปเดตอัตโนมัติ">
<style>
:root{
  --bg:#0a0a0a; --panel:#141414; --panel2:#1d1d1d; --line:#2a2a2a;
  --txt:#f5f5f5; --mut:#9a9a9a; --gold:#d4af37; --red:#e35d5d; --grn:#7ad17a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI','Noto Sans Thai',system-ui,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:10;background:rgba(10,10,10,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hwrap{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-size:1.35rem;font-weight:800;letter-spacing:.18em}
.logo span{color:var(--gold)}
.upd{font-size:.75rem;color:var(--mut);margin-left:auto}
.tabs{max-width:1100px;margin:0 auto;padding:10px 16px 0;display:flex;gap:8px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--panel);color:var(--txt);border-radius:999px;padding:8px 18px;cursor:pointer;font-size:.9rem;transition:.15s}
.tab small{display:block;color:var(--mut);font-size:.7rem}
.tab.active{background:var(--txt);color:#000;border-color:var(--txt)}
.tab.active small{color:#444}
.controls{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap}
.controls input,.controls select{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 12px;font-size:.9rem}
.controls input{flex:1;min-width:180px}
main{max-width:1100px;margin:0 auto;padding:6px 16px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .15s}
.card:hover{transform:translateY(-2px)}
.imgbox{background:#fff;height:170px;display:flex;align-items:center;justify-content:center;position:relative}
.imgbox img{max-width:90%;max-height:90%;object-fit:contain}
.noimg{color:#bbb;font-size:.8rem}
.badge{position:absolute;top:8px;left:8px;background:#000;color:#fff;font-size:.68rem;padding:3px 9px;border-radius:999px;border:1px solid #333}
.sold .imgbox img{filter:grayscale(1);opacity:.45}
.soldtag{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--red);font-size:1.1rem;letter-spacing:.1em;background:rgba(0,0,0,.45)}
.body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
.name{font-size:.84rem;line-height:1.45;min-height:3.7em}
.rowx{display:flex;align-items:baseline;justify-content:space-between;margin-top:auto}
.price{font-size:1.25rem;font-weight:800;color:var(--gold)}
.price small{font-size:.7rem;color:var(--mut);font-weight:400}
.left{font-size:.8rem;color:var(--grn)}
.left.low{color:#e8c468}
.left.out{color:var(--red)}
.slots{display:flex;gap:5px;flex-wrap:wrap}
.slot{font-size:.66rem;border:1px solid var(--line);background:var(--panel2);border-radius:6px;padding:2px 7px;color:var(--mut)}
.slot b{color:var(--txt)}
.slot.out{opacity:.45;text-decoration:line-through}
.empty{color:var(--mut);text-align:center;padding:60px 0}
footer{border-top:1px solid var(--line);color:var(--mut);font-size:.75rem;text-align:center;padding:18px}
.loading{text-align:center;color:var(--mut);padding:80px 0}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}.imgbox{height:130px}.name{font-size:.76rem}}
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <div class="logo">BLACK<span>CARD</span></div>
    <div style="font-size:.78rem;color:var(--mut)">Trading Card Vending</div>
    <div class="upd" id="updated"></div>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<div class="controls">
  <input id="q" type="search" placeholder="ค้นหาสินค้า เช่น One Piece, Pokemon, Lorcana...">
  <select id="cat"><option value="">ทุกหมวด</option></select>
  <select id="stock">
    <option value="">ทั้งหมด</option>
    <option value="in">มีของ</option>
    <option value="out">หมด</option>
  </select>
</div>

<main><div class="loading" id="loading">กำลังโหลดข้อมูล...</div><div class="grid" id="grid"></div><div class="empty" id="empty" style="display:none">ไม่พบสินค้า</div></main>

<footer>ข้อมูลอัปเดตอัตโนมัติจากตู้จริง · จำนวนคงเหลืออาจเปลี่ยนแปลงตามการขายหน้าตู้</footer>

<script>
let DATA=null, mi=0;
const $=id=>document.getElementById(id);
const fmt=n=>n==null?'—':n.toLocaleString('th-TH');

function groupProducts(m){
  const map=new Map();
  for(const s of (m.slots||[])){
    const key=s.name;
    if(!map.has(key)) map.set(key,{name:s.name,price:s.price,img:s.img,cat:s.cat||'',qty:0,cap:0,slots:[]});
    const p=map.get(key);
    p.qty+=s.qty; p.cap+=s.capacity; p.slots.push(s);
    if(p.price==null&&s.price!=null)p.price=s.price;
    if(!p.img&&s.img)p.img=s.img;
  }
  return [...map.values()].sort((a,b)=>(b.qty>0)-(a.qty>0)||(a.cat||'').localeCompare(b.cat||'')||(b.price||0)-(a.price||0));
}

function renderTabs(){
  $('tabs').innerHTML=DATA.machines.map((m,i)=>
    `<button class="tab${i===mi?' active':''}" onclick="selM(${i})">${m.site||m.id}<small>${m.route||''} · ${(m.slots||[]).length} ช่อง</small></button>`).join('');
}
function selM(i){mi=i;renderTabs();renderCat();render();}

function renderCat(){
  const cats=[...new Set(groupProducts(DATA.machines[mi]).map(p=>p.cat).filter(Boolean))].sort();
  $('cat').innerHTML='<option value="">ทุกหมวด</option>'+cats.map(c=>`<option>${c}</option>`).join('');
}

function render(){
  const q=$('q').value.trim().toLowerCase(), cat=$('cat').value, st=$('stock').value;
  let items=groupProducts(DATA.machines[mi]);
  if(q)items=items.filter(p=>p.name.toLowerCase().includes(q));
  if(cat)items=items.filter(p=>p.cat===cat);
  if(st==='in')items=items.filter(p=>p.qty>0);
  if(st==='out')items=items.filter(p=>p.qty===0);
  $('grid').innerHTML=items.map(p=>{
    const out=p.qty===0;
    const lowCls=out?'out':(p.qty<=Math.max(2,p.cap*.15)?'low':'');
    return `<div class="card${out?' sold':''}">
      <div class="imgbox">${p.img?`<img loading="lazy" src="${p.img}" alt="">`:'<div class="noimg">ไม่มีรูป</div>'}
        ${p.cat?`<div class="badge">${p.cat}</div>`:''}
        ${out?'<div class="soldtag">SOLD OUT</div>':''}
      </div>
      <div class="body">
        <div class="name">${p.name}</div>
        <div class="rowx">
          <div class="price">${p.price!=null?'฿'+fmt(p.price):'<small>สอบถามหน้าตู้</small>'}</div>
          <div class="left ${lowCls}">${out?'หมด':'เหลือ '+p.qty+' ชิ้น'}</div>
        </div>
        <div class="slots">${p.slots.map(s=>`<span class="slot${s.qty===0?' out':''}">ช่อง ${s.aisle} · <b>${s.qty}</b></span>`).join('')}</div>
      </div>
    </div>`;}).join('');
  $('empty').style.display=items.length?'none':'block';
}

['q','cat','stock'].forEach(id=>$(id).addEventListener('input',render));

fetch('data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d;
  $('loading').style.display='none';
  const t=new Date(d.updatedAt);
  $('updated').textContent='อัปเดตล่าสุด '+t.toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'});
  renderTabs();renderCat();render();
}).catch(()=>{$('loading').textContent='โหลดข้อมูลไม่สำเร็จ';});
</script>
</body>
</html>
