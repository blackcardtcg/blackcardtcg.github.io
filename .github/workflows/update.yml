name: อัปเดตข้อมูลสินค้าในตู้

on:
  schedule:
    # ทุก 30 นาที (เวลา UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # กดรันเองได้จากแท็บ Actions

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ดึงข้อมูลจาก VMS
        env:
          VMS_ACCOUNTS: ${{ secrets.VMS_ACCOUNTS }}
        run: node sync.js

      - name: Commit ข้อมูลใหม่
        run: |
          git config user.name "vending-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "อัปเดตข้อมูลสินค้า $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
